<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品展示 - 约拍网</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .work-card { cursor: pointer; transition: transform 0.3s; margin-bottom: 25px; }
        .work-card:hover { transform: scale(1.03); }
        .work-img { height: 250px; width: 100%; object-fit: cover; }
        .footer { background-color: #333; color: white; padding: 40px 0; margin-top: 50px; }
        .photographer-name { color: #0d6efd; font-size: 0.85rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand" href="index.html">📷 约拍网</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
                <li class="nav-item"><a class="nav-link active" href="works.html">作品展示</a></li>
                <li class="nav-item"><a class="nav-link" href="photographers.html">摄影师</a></li>
                <li class="nav-item"><a class="nav-link" href="booking.html">立即预约</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">管理登录</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-4">
    <h2 class="text-center">📷 摄影作品集</h2>
    <p class="text-center text-muted">浏览摄影师优秀作品，寻找灵感</p>
</div>

<!-- 作品筛选 -->
<div class="container mb-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="btn-group w-100">
                <button class="btn btn-outline-primary filter-btn active" data-filter="all">全部</button>
                <button class="btn btn-outline-primary filter-btn" data-filter="人像">人像</button>
                <button class="btn btn-outline-primary filter-btn" data-filter="风景">风景</button>
                <button class="btn btn-outline-primary filter-btn" data-filter="婚礼">婚礼</button>
                <button class="btn btn-outline-primary filter-btn" data-filter="商业">商业</button>
            </div>
        </div>
    </div>
</div>

<!-- 作品网格 -->
<div class="container">
    <div class="row" id="worksGrid"></div>
</div>

<footer class="footer">
    <div class="container text-center">
        <p>&copy; 2026 约拍网 版权所有</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 固定的6个作品数据（使用本地图片）
    const FIXED_WORKS = [
        { title: "清新人像", category: "人像", photographer: "张摄影师", description: "日系清新风格，自然光拍摄", image: "images/青春.jpg" },
        { title: "时尚人像", category: "人像", photographer: "孙摄影师", description: "时尚大片风格，棚拍", image: "images/活力.jpg" },
        { title: "山川风景", category: "风景", photographer: "赵摄影师", description: "壮丽山川，自然风光", image: "images/秋日.JPG" },
        { title: "森林风景", category: "风景", photographer: "赵摄影师", description: "森林秘境，自然光影", image: "images/希望.jpg" },
        { title: "浪漫婚礼", category: "婚礼", photographer: "李摄影师", description: "浪漫瞬间，永恒回忆", image: "images/婚礼.JPG" },
        { title: "产品摄影", category: "商业", photographer: "王摄影师", description: "商业产品，质感拍摄", image: "images/氛围.jpg" }
    ];
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function loadWorks() {
        const container = document.getElementById('worksGrid');
        if (!container) return;
        
        container.innerHTML = '';
        FIXED_WORKS.forEach((work, index) => {
            container.innerHTML += `
                <div class="col-md-6 col-lg-4 work-item" data-category="${work.category}">
                    <div class="card work-card">
                        <img src="${work.image}" class="work-img" alt="${work.title}" onerror="this.src='https://picsum.photos/400/250?random=${index}'">
                        <div class="card-body">
                            <h5 class="card-title">${escapeHtml(work.title)}</h5>
                            <p class="card-text">${escapeHtml(work.description)}</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="badge bg-secondary">${work.category}摄影</span>
                                <span class="photographer-name">📷 摄影师：${work.photographer}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
        
        bindFilterEvents();
    }
    
    function bindFilterEvents() {
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.removeEventListener('click', filterHandler);
            btn.addEventListener('click', filterHandler);
        });
        
        function filterHandler() {
            const filterValue = this.getAttribute('data-filter');
            filterBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const items = document.querySelectorAll('.work-item');
            items.forEach(item => {
                if (filterValue === 'all' || item.getAttribute('data-category') === filterValue) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }
    }
    
    loadWorks();
</script>
</body>
</html>
