<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理登录 - 约拍网</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .login-card {
            max-width: 450px;
            margin: 100px auto;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .footer {
            background-color: #333;
            color: white;
            padding: 20px 0;
            margin-top: 50px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<!-- 导航栏 - 所有链接都在新标签页打开 -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand" href="index.html" target="_blank">📷 约拍网</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html" target="_blank">首页</a></li>
                <li class="nav-item"><a class="nav-link" href="works.html" target="_blank">作品展示</a></li>
                <li class="nav-item"><a class="nav-link" href="photographers.html" target="_blank">摄影师</a></li>
                <li class="nav-item"><a class="nav-link" href="booking.html" target="_blank">立即预约</a></li>
                <li class="nav-item"><a class="nav-link active" href="login.html">管理登录</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card login-card">
        <div class="card-body p-5">
            <h3 class="text-center mb-4">📷 管理员登录</h3>
            <p class="text-center text-muted mb-4">请使用管理员账号登录</p>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label">记住密码</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">登录</button>
            </form>
            
            <div class="text-center mt-3">
                <small class="text-muted">演示账号：admin / 123456</small>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <div class="text-center">
            <p class="mb-0">&copy; 2026 约拍网 版权所有</p>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const loginForm = document.getElementById('loginForm');
    
    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        if (username === 'admin' && password === '123456') {
            localStorage.setItem('isAdminLoggedIn', 'true');
            localStorage.setItem('adminUsername', username);
            // 管理后台也在新标签页打开
            window.open('admin.html', '_blank');
        } else {
            alert('用户名或密码错误！\n演示账号：admin / 123456');
        }
    });
    
    if (localStorage.getItem('isAdminLoggedIn') === 'true') {
        window.location.href = 'admin.html';
    }
</script>
</body>
</html>
