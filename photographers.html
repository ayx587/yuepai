<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄影师列表 - 约拍网</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .photographer-card {
            transition: transform 0.3s;
            margin-bottom: 25px;
        }
        .photographer-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 15px;
        }
        .footer {
            background-color: #333;
            color: white;
            padding: 40px 0;
            margin-top: 50px;
        }
        .filter-sidebar {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand" href="index.html">📷 约拍网</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
                <li class="nav-item"><a class="nav-link" href="works.html">作品展示</a></li>
                <li class="nav-item"><a class="nav-link active" href="photographers.html">摄影师</a></li>
                <li class="nav-item"><a class="nav-link" href="booking.html">立即预约</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">管理登录</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-4">
    <h2 class="text-center">👨‍🎨 摄影师团队</h2>
    <p class="text-center text-muted">选择你喜欢的摄影师，记录美好时刻</p>
</div>

<div class="container">
    <div class="row">
        <!-- 筛选侧边栏 -->
        <div class="col-md-3 mb-4">
            <div class="filter-sidebar">
                <h5>筛选条件</h5>
                <hr>
                <label class="form-label">摄影风格</label>
                <select class="form-select mb-3" id="styleFilter">
                    <option value="all">全部风格</option>
                    <option value="人像">人像摄影</option>
                    <option value="婚礼">婚礼摄影</option>
                    <option value="风景">风景摄影</option>
                    <option value="商业">商业摄影</option>
                </select>
                
                <label class="form-label">价格区间</label>
                <select class="form-select mb-3" id="priceFilter">
                    <option value="all">全部价格</option>
                    <option value="0-200">¥200以下</option>
                    <option value="200-300">¥200 - ¥300</option>
                    <option value="300-400">¥300 - ¥400</option>
                    <option value="400-9999">¥400以上</option>
                </select>
                
                <label class="form-label">排序方式</label>
                <select class="form-select" id="sortFilter">
                    <option value="default">默认排序</option>
                    <option value="price_asc">价格从低到高</option>
                    <option value="price_desc">价格从高到低</option>
                    <option value="rating">评分最高</option>
                </select>
                
                <button class="btn btn-primary w-100 mt-3" id="applyFilter">应用筛选</button>
            </div>
        </div>
        
        <!-- 摄影师列表 -->
        <div class="col-md-9">
            <div class="row" id="photographersList">
                <!-- 摄影师卡片会动态加载 -->
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container text-center">
        <p>&copy; 2026 约拍网 版权所有</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ========== 默认摄影师数据（首次使用时初始化） ==========
    const defaultPhotographers = [
        { id: 1, name: "张摄影师", avatar: "https://picsum.photos/200/200?random=30", style: "人像", price: 225, rating: 5, desc: "擅长人像摄影，风格清新自然，拍摄经验5年。", isDefault: true },
        { id: 2, name: "李摄影师", avatar: "https://picsum.photos/200/200?random=31", style: "婚礼", price: 325, rating: 4.5, desc: "专注婚礼摄影，捕捉最动人的瞬间。", isDefault: true },
        { id: 3, name: "王摄影师", avatar: "https://picsum.photos/200/200?random=32", style: "商业", price: 588, rating: 5, desc: "商业摄影专家，产品拍摄、广告摄影。", isDefault: true },
        { id: 4, name: "赵摄影师", avatar: "https://picsum.photos/200/200?random=33", style: "风景", price: 89, rating: 4, desc: "热爱大自然，擅长风光摄影。", isDefault: true },
        { id: 5, name: "孙摄影师", avatar: "https://picsum.photos/200/200?random=34", style: "人像", price: 129, rating: 4.5, desc: "时尚人像摄影师，作品多次获奖。", isDefault: true },
        { id: 6, name: "周摄影师", avatar: "https://picsum.photos/200/200?random=35", style: "婚礼", price: 488, rating: 5, desc: "婚礼摄影大师，记录每一份感动。", isDefault: true }
    ];
    
    // 初始化摄影师数据（如果 localStorage 中没有）
    function initPhotographers() {
        const existing = localStorage.getItem('photographers');
        if (!existing || existing === '[]') {
            localStorage.setItem('photographers', JSON.stringify(defaultPhotographers));
        }
    }
    
    // 获取所有摄影师
    function getPhotographers() {
        return JSON.parse(localStorage.getItem('photographers') || '[]');
    }
    
    // 渲染摄影师列表
    function renderPhotographers(data) {
        const container = document.getElementById('photographersList');
        if (!container) return;
        
        if (data.length === 0) {
            container.innerHTML = '<div class="col-12 text-center text-muted">暂无摄影师数据</div>';
            return;
        }
        
        container.innerHTML = '';
        data.forEach(p => {
            // 生成星级显示
            const fullStars = Math.floor(p.rating);
            const halfStar = p.rating % 1 >= 0.5 ? 1 : 0;
            const emptyStars = 5 - fullStars - halfStar;
            let starsHtml = '';
            for (let i = 0; i < fullStars; i++) starsHtml += '★';
            if (halfStar) starsHtml += '½';
            for (let i = 0; i < emptyStars; i++) starsHtml += '☆';
            
            container.innerHTML += `
                <div class="col-md-6 col-lg-4">
                    <div class="card photographer-card h-100">
                        <div class="text-center pt-3">
                            <img src="${p.avatar}" class="avatar" alt="${p.name}" onerror="this.src='https://picsum.photos/200/200?random=1'">
                        </div>
                        <div class="card-body">
                            <h5 class="card-title text-center">${escapeHtml(p.name)}</h5>
                            <p class="card-text text-center text-muted small">${escapeHtml(p.desc)}</p>
                            <div class="text-center mb-2">
                                <span class="badge bg-secondary">${escapeHtml(p.style)}</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="text-primary fw-bold">¥${p.price}/起</span>
                                <span class="text-warning">${starsHtml} ${p.rating}</span>
                            </div>
                            <a href="booking.html?photographer=${p.id}" class="btn btn-outline-primary mt-3 w-100">预约 ${escapeHtml(p.name)}</a>
                        </div>
                    </div>
                </div>
            `;
        });
    }
    
    // 防止XSS攻击
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // 筛选和排序
    function filterAndSort() {
        let photographers = getPhotographers();
        const style = document.getElementById('styleFilter')?.value || 'all';
        const price = document.getElementById('priceFilter')?.value || 'all';
        const sort = document.getElementById('sortFilter')?.value || 'default';
        
        // 风格筛选
        if (style !== 'all') {
            photographers = photographers.filter(p => p.style === style);
        }
        
        // 价格筛选
        if (price !== 'all') {
            const [min, max] = price.split('-').map(Number);
            photographers = photographers.filter(p => p.price >= min && p.price <= max);
        }
        
        // 排序
        if (sort === 'price_asc') {
            photographers.sort((a, b) => a.price - b.price);
        } else if (sort === 'price_desc') {
            photographers.sort((a, b) => b.price - a.price);
        } else if (sort === 'rating') {
            photographers.sort((a, b) => b.rating - a.rating);
        }
        
        renderPhotographers(photographers);
    }
    
    // ========== 页面初始化 ==========
    initPhotographers();
    renderPhotographers(getPhotographers());
    
    // 绑定筛选按钮事件
    document.getElementById('applyFilter')?.addEventListener('click', filterAndSort);
</script>
</body>
</html>
